<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽獎系統</title>
    <style>
        /* CSS 樣式 */
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        #background-container {
            position: relative;
            width: 80%;
            height: 100%;
            background-image: url('background.png'); /* 確保您的背景圖片檔名正確 */
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        #right-panel {
            width: 20%;
            height: 100%;
            background-color: #f0f0f0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gift {
            position: absolute;
            width: 220px;
            height: 220px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            /* 將過渡動畫設定在這裡 */
            transition: transform 1s ease-out, left 1s ease-out, top 1s ease-out;
        }
        
        /* 普通禮物掉落動畫 */
        .fall-animation {
            animation: fall linear forwards;
        }
        
        /* 中獎禮物掉落動畫 */
        .fall-to-win-animation {
            animation: fallToWin linear forwards;
        }

        @keyframes fall {
            from {
                transform: translateY(-100px);
                opacity: 1;
            }
            to {
                transform: translateY(calc(100vh + 100px));
                opacity: 1;
            }
        }
        
        @keyframes fallToWin {
            from {
                transform: translateY(-100px);
                opacity: 1;
            }
            to {
                transform: translateY(calc(100vh - 100px));
                opacity: 1;
            }
        }

        /* 中獎橫幅的樣式 */
        #winner-banner {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            color: #d9534f;
            font-size: 2.5em;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            white-space: pre-wrap;
            opacity: 0;
            transform: scaleY(0) translateX(-50%);
            transform-origin: bottom center;
            transition: all 0.5s ease-out;
            z-index: 1001;
        }
        
        #winner-banner.show {
            opacity: 1;
            transform: scaleY(1) translateX(-50%);
        }

        button {
            padding: 10px 20px;
            font-size: 1.2em;
            margin-bottom: 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #winner-list-container {
            margin-top: 20px;
            width: 90%;
            max-height: calc(100% - 200px);
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            background-color: white;
        }

        #winner-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #winner-list li {
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            font-size: 1.1em;
            color: #333;
        }

        /* --- ▼▼▼ 新增的雪花樣式 ▼▼▼ --- */
        .snowflake {
            position: absolute;
            top: -10px; /* 從畫面頂部外開始 */
            background-color: white;
            border-radius: 50%; /* 讓它變成圓形 */
            pointer-events: none; /* 讓雪花不會干擾滑鼠點擊 */
            animation: snowfall linear infinite;
        }

        @keyframes snowfall {
            to {
                transform: translateY(105vh); /* 飄落到畫面底部之外 */
            }
        }
        /* --- ▲▲▲ 雪花樣式結束 ▲▲▲ --- */
    </style>
</head>
<body>
    <audio id="winner-sound" src="winner.mp3" preload="auto"></audio>

    <div id="background-container">
        <div id="winner-banner"></div>
    </div>

    <div id="right-panel">
        <h2>抽獎控制台</h2>
        <div id="file-upload-container">
            <h3>上傳名單 (Excel .xlsx)</h3>
            <input type="file" id="file-input" accept=".xlsx">
            <p>請上傳包含所有參賽者姓名的Excel檔案，第一欄為姓名。</p>
        </div>
        <button id="single-draw-button">單次抽獎</button>
        <button id="multi-draw-button">一次抽5位</button>
        <h3>中獎者名單</h3>
        <div id="winner-list-container">
            <ul id="winner-list"></ul>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script>
        const backgroundContainer = document.getElementById('background-container');
        const winnerBanner = document.getElementById('winner-banner');
        const singleDrawButton = document.getElementById('single-draw-button');
        const multiDrawButton = document.getElementById('multi-draw-button');
        const winnerList = document.getElementById('winner-list');
        const fileInput = document.getElementById('file-input');
        const winnerSound = document.getElementById('winner-sound');
        const giftImages = [
            'gift1.png',
            'gift2.png',
            'gift3.png'
        ];

        let participantList = [];
        let remainingParticipants = [];
        
        const GIFT_HEIGHT = 100;

        // --- ▼▼▼ 新增的雪花飄落功能 ▼▼▼ ---
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');

            // 隨機設定雪花的大小
            const size = Math.random() * 4 + 5; // 大小介於 2px 到 6px
            snowflake.style.width = `${size}px`;
            snowflake.style.height = `${size}px`;

            // 隨機設定雪花的起始水平位置
            snowflake.style.left = `${Math.random() * 100}%`;

            // 隨機設定雪花的飄落速度 (動畫時間)
            const duration = Math.random() * 5 + 8; // 速度介於 8 到 13 秒
            snowflake.style.animationDuration = `${duration}s`;
            
            // 隨機設定雪花開始飄落的延遲時間
            const delay = Math.random() * 5;
            snowflake.style.animationDelay = `${delay}s`;

            // 隨機設定雪花的透明度
            snowflake.style.opacity = Math.random() * 0.7 + 0.3; // 透明度 0.3 到 1.0

            backgroundContainer.appendChild(snowflake);

            // 當雪花飄落動畫結束後，將其從畫面移除，避免累積過多元素
            setTimeout(() => {
                snowflake.remove();
            }, (duration + delay) * 1000);
        }

        // 每隔一段時間就產生一片新的雪花
        // 數字越小，雪花越密集
        setInterval(createSnowflake, 80); 
        // --- ▲▲▲ 雪花功能結束 ▲▲▲ ---

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        participantList = json.slice(1).map(row => row ? row[0] : '').filter(name => name);
                        remainingParticipants = [...participantList];
                        winnerList.innerHTML = '';
                        //alert(`成功載入 ${participantList.length} 位參賽者。`);
                    } catch (error) {
                        alert("讀取 Excel 檔案失敗，請確認檔案格式是否正確。");
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        function createGift(imageUrl) {
            const gift = document.createElement('div');
            gift.classList.add('gift');
            gift.style.backgroundImage = `url('${imageUrl}')`;
            return gift;
        }
        
        function startDrawAnimation(winnerCount) {
            const winners = drawAndListWinners(winnerCount);
            if (!winners) return;
            
            singleDrawButton.disabled = true;
            multiDrawButton.disabled = true;

            const numberOfGifts = 40;
            const winningGiftIndex = Math.floor(Math.random() * numberOfGifts);
            
            for (let i = 0; i < numberOfGifts; i++) {
                const gift = createGift(giftImages[Math.floor(Math.random() * giftImages.length)]);
                const startX = Math.random() * (backgroundContainer.offsetWidth - GIFT_HEIGHT);
                gift.style.left = `${startX}px`;
                gift.style.animationDuration = `${1.4 + Math.random() * 1}s`;

                if (i === winningGiftIndex) {
                    gift.classList.add('fall-to-win-animation');
                    gift.style.animationDelay = '1.9s';

                    gift.addEventListener('animationend', () => {
                        // ▼▼▼ 核心修正就在這裡 ▼▼▼
                        // 使用一個極短的 setTimeout 來強制瀏覽器先結束 animation 的渲染，
                        // 然後再應用新的樣式，這樣 transition 動畫才能被正確觸發。
                        setTimeout(() => {
                            // 設定目標狀態：畫面正中心
                            gift.style.top = '50%';
                            gift.style.left = '50%';
                            gift.style.zIndex = '1000';
                            
                            // 設定目標 transform：置中並放大5倍
                            gift.style.transform = 'translate(-50%, -50%) scale(15)';

                            // 等待 1 秒 (transition 的時間) 後顯示中獎橫幅
                            setTimeout(() => {
                                showWinnerBanner(winners);
                            }, 1000);
                        }, 20); // 延遲 20 毫秒就足夠了
                        // ▲▲▲ 核心修正結束 ▲▲▲
                    }, { once: true });

                } else {
                    gift.classList.add('fall-animation');
                    gift.style.animationDelay = `${Math.random() * 2}s`;
                    gift.addEventListener('animationend', () => gift.remove(), { once: true });
                }
                backgroundContainer.appendChild(gift);
            }
        }
        
        function showWinnerBanner(winners) {
            const winnerText = winners.join('、 ');
            winnerBanner.innerHTML = `恭喜 ${winnerText} 中獎!`;
            winnerBanner.style.top = '40%';
            winnerBanner.style.left = '50%';
            winnerBanner.style.bottom = '';
            winnerBanner.classList.add('show');

            // --- ▼▼▼ 新增的音效播放程式碼 ▼▼▼ ---
            if (winnerSound) {
                winnerSound.currentTime = 0; // 將音效拉回開頭，確保每次都從頭播放
                winnerSound.play();          // 播放音效
            }
            // --- ▲▲▲ 新增程式碼結束 ▲▲▲ ---

            setTimeout(resetLottery, 2000);
        }

        function drawAndListWinners(count) {
            if (remainingParticipants.length < count) {
                alert(`剩餘人數不足 ${count} 人，無法抽獎！`);
                return null;
            }
            const winners = [];
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * remainingParticipants.length);
                const winner = remainingParticipants.splice(randomIndex, 1)[0];
                winners.push(winner);
            }

            // --- ▼▼▼ 簡單的修改在這裡 ▼▼▼ ---
            // 等待 5 秒後，再執行填入列表的動作
            setTimeout(() => {
                winners.forEach(winner => {
                    const listItem = document.createElement('li');
                    listItem.textContent = winner;
                    winnerList.prepend(listItem);
                });
            }, 5000); // 5000 毫秒 = 5 秒
            // --- ▲▲▲ 修改結束 ▲▲▲ ---

            return winners;
        }
        
        function resetLottery() {
            winnerBanner.classList.remove('show');
            document.querySelectorAll('.gift').forEach(gift => gift.remove());
            singleDrawButton.disabled = false;
            multiDrawButton.disabled = false;
        }

        singleDrawButton.addEventListener('click', () => {
            if (participantList.length === 0) {
                alert('請先上傳參賽者名單！');
                return;
            }
            startDrawAnimation(1);
        });

        multiDrawButton.addEventListener('click', () => {
            if (participantList.length === 0) {
                alert('請先上傳參賽者名單！');
                return;
            }
            startDrawAnimation(5);
        });
    </script>
</body>
</html>
